<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>cron-ui</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <div class="brand">cron-ui</div>
        <div class="subtitle">OpenClaw cron jobs, live and local.</div>
      </div>
      <nav class="nav">
        <a href="/">Dashboard</a>
        <a href="/jobs">Jobs</a>
        <a href="/health">Health</a>
      </nav>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      <span>Self-hostable dashboard</span>
      <span>{{ updated_at if updated_at is defined else '' }}</span>
    </footer>

    <script src="/static/js/app.js"></script>
  </body>
</html>
