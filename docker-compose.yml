services:
  cron-ui:
    build: .
    container_name: cron-ui
    ports:
      - "8906:8906"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CRON_UI_DB_PATH=/app/data/cron-ui.sqlite3
      - OPENCLAW_CRON_URL=http://host.docker.internal:8905
      - CRON_UI_PORT=8906
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8906/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cron-ui-network

networks:
  cron-ui-network:
    driver: bridge
